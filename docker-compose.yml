services:
  cassandra:
    image: cassandra:5.0.8
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
    - CASSANDRA_DC=datacenter1
    - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    - MAX_HEAP_SIZE=400M  
    - HEAP_NEWSIZE=100M
    - MALLOC_ARENA_MAX=2

    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - app-network

    volumes:
      - cassandra_data:/var/lib/cassandra


  backend:
    build: ./backend
    container_name: spring-backend
    ports:
      - "8080:8080"
    depends_on:
      cassandra:
        condition: service_healthy

    environment:
      - SPRING_CASSANDRA_CONTACT_POINTS=cassandra
      - SPRING_CASSANDRA_LOCAL_DATACENTER=datacenter1
      - SPRING_CASSANDRA_KEYSPACE_NAME=my_keyspace
      - SPRING_CASSANDRA_REQUEST_TIMEOUT=10s
      - SPRING_CASSANDRA_CONNECTION_CONNECT_TIMEOUT=10s
      - SPRING_CASSANDRA_CONNECTION_INIT_QUERY_TIMEOUT=10s
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

    networks:
      - app-network


  frontend:
    build: ./frontend
    container_name: angular-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  cassandra_data: